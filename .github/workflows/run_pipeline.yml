name: End-to-End MLOps Pipeline

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: playwright install --with-deps chromium        

      # 1. Run Pipeline (Scrape & Train)
      - name: Run Pipeline (Scrape & Train)
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          APP_ENV: cloud
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
        run: python run_pipeline.py

      # 2. Fetch Real Production Model (Before Pytest!)
      # We use EOF to safely write multi-line Python code
      - name: Fetch Real Production Model
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO_NAME: "Car-Price-Prediction-MLOps"
        run: |
          python << 'EOF'
          import os, mlflow, joblib
          
          os.makedirs('models', exist_ok=True)
          model_path = 'models/car_price_model.pkl'
          
          # If training didn't happen, fetch the latest stable model
          if not os.path.exists(model_path):
              print('📥 No new model trained. Pulling real model from DagsHub Registry...')
              mlflow.set_tracking_uri(f'https://dagshub.com/{os.environ["DAGSHUB_USERNAME"]}/{os.environ["DAGSHUB_REPO_NAME"]}.mlflow')
              model = mlflow.xgboost.load_model('models:/Saudi_Car_Price_Predictor@Production')
              joblib.dump(model, model_path)
              print('✅ Real model synced and ready for testing.')
          else:
              print('🚀 Using the newly trained model from this run.')
          EOF

      # 3. Run Quality Tests on REAL artifacts
      - name: Run Pytest
        run: pytest tests/

      # 4. Build & Push Docker Images
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push API Image
        run: |
          docker build --target api_stage -t ${{ secrets.DOCKER_USERNAME }}/saudi-cars-api:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/saudi-cars-api:latest

      - name: Build and Push Dashboard Image
        run: |
          docker build --target dashboard_stage -t ${{ secrets.DOCKER_USERNAME }}/saudi-cars-dashboard:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/saudi-cars-dashboard:latest

      # 5. Trigger Render Deployment
      - name: Trigger Render Deploy
        run: |
          curl -f ${{ secrets.RENDER_API_DEPLOY_HOOK }}
          curl -f ${{ secrets.RENDER_DASHBOARD_DEPLOY_HOOK }}
